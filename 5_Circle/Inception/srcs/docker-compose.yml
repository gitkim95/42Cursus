version: '3.7'

services:
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    ports:
      - "443:443"
    networks:
      - app-network
    volumes:
      - /home/gitkim/data/nginx:/var/www/html
      - ./requirements/nginx/conf:/etc/nginx/conf.d
      - ./requirements/nginx/tools:/docker-entrypoint-initdb.d
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    restart: always

  db:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
      args:
        MYSQL_DATABASE: ${MYSQL_DATABASE}
        MYSQL_USER: ${MYSQL_USER}
    secrets:
      - db_root_password
      - db_password
    volumes:
      - /home/gitkim/data/mysql:/var/lib/mysql
      - ./requirements/mariadb/conf:/etc/mysql/conf.d
      - ./requirements/mariadb/tools:/docker-entrypoint-initdb.d
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD_FILE=/run/secrets/db_password
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db_root_password

    networks:
      - app-network
    restart: always

  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    secrets:
      - db_root_password
      - db_password
      - credentials
    volumes:
      - /home/gitkim/data/wordpress:/var/www/html
    environment:
      - WORDPRESS_DB_HOST=db
      - WORDPRESS_DB_USER=${MYSQL_USER}
      - WORDPRESS_DB_PASSWORD_FILE=/run/secrets/db_password
      - WORDPRESS_DB_NAME=${MYSQL_DATABASE}
      - WORDPRESS_ADMIN_USER_FILE=/run/secrets/credentials
      - WORDPRESS_ADMIN_PASSWORD_FILE=/run/secrets/db_root_password
      - WORDPRESS_ADMIN_EMAIL=${MY_EMAIL}
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  credentials:
    file: ../secrets/credentials.txt