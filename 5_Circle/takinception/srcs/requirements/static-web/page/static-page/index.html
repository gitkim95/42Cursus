<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors Deluxe</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* 기본 폰트와 배경 설정 */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #4b6cb7, #182848);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #fff;
    }
    /* 게임 컨테이너 */
    #game {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
      width: 350px;
      position: relative;
      overflow: hidden;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      animation: slideDown 1s ease-out;
    }
    p.instructions {
      font-size: 1rem;
      margin-bottom: 20px;
      opacity: 0.8;
      animation: fadeIn 2s ease-in;
    }
    /* 버튼 스타일 */
    #buttons {
      margin: 20px 0;
    }
    #buttons button {
      background-color: #3498db;
      border: none;
      padding: 15px 20px;
      border-radius: 8px;
      margin: 10px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }
    #buttons button:hover {
      background-color: #2980b9;
      transform: scale(1.05);
    }
    #buttons button:active {
      transform: scale(0.95);
    }
    /* 플레이어와 컴퓨터 선택 결과 스타일 */
    .choices-container {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 1rem;
      animation: fadeIn 1.5s ease-out;
    }
    /* 결과 (최종 승패) 큰 글씨 스타일 */
    .result-outcome {
      font-size: 2rem;
      font-weight: bold;
      animation: fadeIn 1.5s ease-out;
    }
    /* 애니메이션 정의 */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes pop {
      0%   { transform: scale(0.8); }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="game">
    <h1>Rock Paper Scissors</h1>
    <p class="instructions">Choose your move:</p>
    <div id="buttons">
      <button data-choice="rock">Rock</button>
      <button data-choice="paper">Paper</button>
      <button data-choice="scissors">Scissors</button>
    </div>
    <div id="result"></div>
  </div>

  <script>
    const choices = ["rock", "paper", "scissors"];
    const buttons = document.querySelectorAll("#buttons button");
    const resultDiv = document.getElementById("result");

    buttons.forEach(button => {
      button.addEventListener("click", () => {
        const playerChoice = button.getAttribute("data-choice");
        const computerChoice = choices[Math.floor(Math.random() * choices.length)];
        let outcome = "";

        if (playerChoice === computerChoice) {
          outcome = "It's a tie!";
        } else if (
          (playerChoice === "rock" && computerChoice === "scissors") ||
          (playerChoice === "paper" && computerChoice === "rock") ||
          (playerChoice === "scissors" && computerChoice === "paper")
        ) {
          outcome = "You win!";
        } else {
          outcome = "You lose!";
        }

        resultDiv.innerHTML = `
          <div class="choices-container">
            <div>Your choice: <strong>${playerChoice}</strong></div>
            <div>Computer's choice: <strong>${computerChoice}</strong></div>
          </div>
          <div class="result-outcome">${outcome}</div>
        `;
      });
    });
  </script>
</body>
</html>
